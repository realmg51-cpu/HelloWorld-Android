version: 2
updates:
  # 1. Kiểm tra GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:30"
      timezone: "Asia/Ho_Chi_Minh"  # Múi giờ Việt Nam
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    reviewers:
      - "your-username"  # Thay bằng username GitHub của bạn

  # 2. Kiểm tra Gradle dependencies (Kotlin/Java)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:30"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "deps"
      include: "scope"
    reviewers:
      - "your-username"
    # Nhóm các dependencies lại với nhau
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
        update-types:
          - "minor"
          - "patch"
      androidx:
        patterns:
          - "androidx.*"
        update-types:
          - "minor"
          - "patch"
      gradle-plugins:
        patterns:
          - "com.android.tools.build*"
          - "org.jetbrains.kotlin*"

  # 3. Kiểm tra Android dependencies
  - package-ecosystem: "gradle"
    directory: "/app"
    schedule:
      interval: "daily"
      time: "05:30"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "deps"
      include: "scope"

  # 4. (Tùy chọn) Kiểm tra GitHub Actions composite
  - package-ecosystem: "github-actions"
    directory: "/.github/actions"
    schedule:
      interval: "daily"
      time: "05:30"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "github-actions"
