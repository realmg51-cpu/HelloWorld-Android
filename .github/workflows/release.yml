name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tên tag (ví dụ: v1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
    
    - name: Make Gradle Wrapper executable
      run: chmod +x gradlew
    
    - name: Clean project
      run: ./gradlew clean --no-daemon
    
    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --no-daemon
    
    - name: Get version name
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=${{ github.event.inputs.tag_name }}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Upload APK as Artifact (luôn chạy)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ steps.get_version.outputs.version }}
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
    
    - name: Create Release (chỉ khi push tag)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: "Release ${{ steps.get_version.outputs.version }}"
        body: |
          ## 📱 下载 APK
          
          直接下载下方 APK 文件安装到 Android 设备或 TV。
          
          ---
          **更新内容:**
          - 显示 "Hi" 消息
          - 支持 Android TV
          
          ---
          **📦 下载:**
          - [app-debug.apk](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/app-debug.apk)
        files: |
          app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Tạo thông báo thành công
      run: |
        echo "## 🎉 Release thành công!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Thông tin | Giá trị |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
        echo "| Phiên bản | \`${{ steps.get_version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| APK file | \`app-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Thời gian | $(date) |" >> $GITHUB_STEP_SUMMARY
