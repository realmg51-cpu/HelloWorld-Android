name: Release APK

on:
  push:
    tags:
      - 'v*'  # Khi push tag v1.0.0, v1.0.1, v2.0.0, ...
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tên tag (ví dụ: v1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew :app:assembleDebug
    
    - name: Get version name
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=${{ github.event.inputs.tag_name }}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: "Release ${{ steps.get_version.outputs.version }}"
        body: |
          ## 📱 下载 APK | Download APK
          
          ### 中文
          直接下载下方 APK 文件安装到 Android 设备或 TV。
          
          ### English
          Download the APK below and install on your Android device or TV.
          
          ---
          
          **📦 更新内容 | What's New**
          - 首次发布 | First release
          - 显示 "Hi" 消息 | Display "Hi" message
          - 支持 Android TV | Android TV compatible
          
        files: |
          app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ steps.get_version.outputs.version }}
        path: app/build/outputs/apk/debug/app-debug.apk
